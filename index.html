<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Flight Monitor</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✈️</text></svg>">
<style>
:root{--bg:#06090f;--surface:#0d1320;--card:#111827;--alt:#151d2e;--border:#1e293b;--accent:#3b82f6;--accentDim:#1e3a5f;--success:#10b981;--successBg:#052e16;--warn:#f59e0b;--warnBg:#451a03;--danger:#ef4444;--dangerBg:#450a0a;--text:#e2e8f0;--dim:#64748b;--muted:#334155;--white:#f8fafc}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'SF Pro Display','Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
input,select,button,textarea{font-family:inherit}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:10px}
.logo{width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,var(--accent),#7c3aed);display:flex;align-items:center;justify-content:center;font-size:15px}
.header h1{font-size:16px;font-weight:700;color:var(--white)}
.header .sub{font-size:10.5px;color:var(--dim)}
.nav{display:flex;gap:3px}
.nav button{padding:7px 14px;border-radius:7px;border:none;font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:var(--dim);transition:all .15s}
.nav button.active{background:var(--accent);color:var(--white)}
.main{padding:14px 16px;max-width:880px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:12px}
.pill{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-size:10.5px;font-weight:600}
.pill-green{background:var(--successBg);color:var(--success)}
.pill-yellow{background:var(--warnBg);color:var(--warn)}
.pill-red{background:var(--dangerBg);color:var(--danger)}
.pill-blue{background:var(--accentDim);color:var(--accent)}
.pill-gray{background:var(--alt);color:var(--dim)}
.metrics{display:flex;gap:5px;flex-wrap:wrap;margin:10px 0}
.metric{flex:1;min-width:65px;background:var(--alt);border-radius:7px;padding:8px 4px;text-align:center}
.metric .val{font-size:16px;font-weight:700}
.metric .lbl{font-size:8.5px;color:var(--dim);margin-top:1px;text-transform:uppercase;font-weight:600;letter-spacing:.05em}
.form-row{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.form-group{flex:1;min-width:120px}
.form-group.sm{flex:0.5;min-width:70px}
.form-group.lg{flex:2;min-width:180px}
label{display:block;font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
input,select,textarea{width:100%;padding:8px 10px;border-radius:7px;border:1px solid var(--border);background:var(--alt);color:var(--text);font-size:13px;outline:none}
input:focus,select:focus{border-color:var(--accent)}
select{appearance:none}
textarea{resize:vertical;min-height:60px}
.btn{padding:7px 15px;border-radius:7px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn:active{opacity:.8}
.btn-primary{background:var(--accent);color:var(--white)}
.btn-ghost{background:var(--alt);color:var(--dim);border:1px solid var(--border)}
.btn-danger{background:var(--dangerBg);color:var(--danger)}
.btn-success{background:var(--successBg);color:var(--success)}
.btn-row{display:flex;gap:6px;margin-top:12px}
.chart-bar{display:flex;align-items:flex-end;gap:1.5px;height:40px}
.chart-bar div{flex:1;border-radius:2px 2px 0 0;transition:height .3s;min-width:2px}
.progress-wrap{position:relative;height:22px;background:var(--alt);border-radius:6px;overflow:hidden;margin-bottom:8px}
.progress-bar{position:absolute;height:100%;border-radius:6px;transition:width .3s}
.progress-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--white)}
.day-picker{display:flex;gap:4px}
.day-btn{flex:1;padding:8px 0;border-radius:7px;border:1px solid var(--border);background:var(--alt);color:var(--dim);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.day-btn.active{border-color:var(--accent);background:var(--accentDim);color:var(--accent)}
details summary{font-size:11px;color:var(--dim);cursor:pointer;font-weight:600;padding:4px 0}
table{width:100%;border-collapse:collapse;font-size:11.5px}
th{text-align:left;padding:5px 7px;border-bottom:1px solid var(--border);color:var(--dim);font-size:9.5px;font-weight:700;text-transform:uppercase}
td{padding:6px 7px;border-bottom:1px solid var(--border)}
tr:nth-child(even){background:var(--alt)}
.empty{text-align:center;padding:50px 20px;color:var(--dim)}
.empty .icon{font-size:36px;margin-bottom:10px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;max-width:400px;width:100%}
.impact{background:var(--alt);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--dim);line-height:1.7;margin-top:8px}
.footer{text-align:center;padding:20px;font-size:10px;color:var(--muted)}
.trip-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.trip-route{font-size:16px;font-weight:700;color:var(--white)}
.trip-detail{font-size:11.5px;color:var(--dim);margin-top:2px}
.config-block{background:var(--alt);border-radius:8px;padding:12px;font-family:'SF Mono',Menlo,monospace;font-size:11px;color:var(--dim);white-space:pre-wrap;word-break:break-all;max-height:200px;overflow:auto;margin-top:8px}
@media(max-width:480px){.form-group{min-width:100%}.metrics{gap:4px}.metric{min-width:55px;padding:6px 2px}.metric .val{font-size:14px}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const LS_KEY='flight-monitor-v5';
const FREE_LIMIT=250;
const PAID_RATE=0.015;
const AIRLINES=[{c:'',l:'All Airlines'},{c:'DL',l:'Delta'},{c:'UA',l:'United'},{c:'AA',l:'American'},{c:'WN',l:'Southwest'},{c:'B6',l:'JetBlue'},{c:'AS',l:'Alaska'},{c:'NK',l:'Spirit'},{c:'F9',l:'Frontier'},{c:'HA',l:'Hawaiian'}];
const STOPS=[{v:'nonstop',l:'Nonstop only'},{v:'1stop',l:'1 stop or fewer'},{v:'any',l:'Any stops'}];
const CABINS=[{v:'economy',l:'Economy'},{v:'premium',l:'Premium Economy'},{v:'business',l:'Business'},{v:'first',l:'First'}];
const DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const HOURS=Array.from({length:24},(_,i)=>({v:i,l:i===0?'12 AM':i<12?i+' AM':i===12?'12 PM':(i-12)+' PM'}));
const THRESHOLDS=[25,40,50,75,100,150,200,300];

function load(){try{return JSON.parse(localStorage.getItem(LS_KEY))||{trips:[],settings:{schedule:{days:['Wed','Sat'],hour:9,tz:'ET'},apiUsage:{}}}}catch(e){return{trips:[],settings:{schedule:{days:['Wed','Sat'],hour:9,tz:'ET'},apiUsage:{}}}}}
function save(data){localStorage.setItem(LS_KEY,JSON.stringify(data))}
function uid(){return Math.random().toString(36).slice(2,10)}
function today(){return new Date().toISOString().split('T')[0]}
function daysOut(d){return Math.ceil((new Date(d)-new Date(today()))/864e5)}
function fmt(n){return n!=null?'$'+Number(n).toFixed(0):'—'}
function monthKey(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')}
function daysLeftInMonth(){const d=new Date();return new Date(d.getFullYear(),d.getMonth()+1,0).getDate()-d.getDate()}
function airlineName(c){return(AIRLINES.find(a=>a.c===c)||{}).l||c||'All'}
function cabinName(c){return(CABINS.find(x=>x.v===c)||{}).l||'Economy'}
function stopsName(c){return(STOPS.find(x=>x.v===c)||{}).l||''}
function h(tag,props,...children){const el=document.createElement(tag);if(props)Object.entries(props).forEach(([k,v])=>{if(k==='onclick'||k==='onchange'||k==='oninput')el[k]=v;else if(k==='className')el.className=v;else if(k==='style'&&typeof v==='object')Object.assign(el.style,v);else if(k==='checked')el.checked=v;else el.setAttribute(k,v)});children.flat(9).forEach(c=>{if(c==null)return;el.appendChild(typeof c==='string'?document.createTextNode(c):c)});return el}

let state=load();
let view='dashboard';
let editId=null;
let checkId=null;

function render(){
  const app=document.getElementById('app');
  app.innerHTML='';
  app.appendChild(renderHeader());
  const main=h('div',{className:'main'});
  if(view==='dashboard')main.appendChild(renderDashboard());
  else if(view==='add')main.appendChild(renderTripForm(null));
  else if(view==='edit'&&editId)main.appendChild(renderTripForm(state.trips.find(t=>t.id===editId)));
  else if(view==='settings')main.appendChild(renderSettings());
  app.appendChild(main);
  app.appendChild(h('div',{className:'footer'},'Data saved in browser · Backend: GitHub Actions + SerpApi + Discord'));
  if(checkId)app.appendChild(renderCheckModal(state.trips.find(t=>t.id===checkId)));
}

function renderHeader(){
  const active=state.trips.filter(t=>t.active&&daysOut(t.outboundDate)>=0);
  const used=state.settings.apiUsage?.[monthKey()]||0;
  return h('div',{className:'header'},
    h('div',{className:'header-left'},
      h('div',{className:'logo'},'✈'),
      h('div',null,h('h1',null,'Flight Monitor'),h('div',{className:'sub'},active.length+' active · '+used+'/'+FREE_LIMIT+' API calls'))
    ),
    h('div',{className:'nav'},
      ...[['dashboard','Trips'],['add','+ Add'],['settings','Settings']].map(([v,l])=>
        h('button',{className:view===v||(view==='edit'&&v==='dashboard')?'active':'',onclick:()=>{view=v;editId=null;render()}},l)
      )
    )
  );
}

function renderDashboard(){
  const wrap=h('div');
  wrap.appendChild(renderUsagePanel());
  const active=state.trips.filter(t=>daysOut(t.outboundDate)>=0).sort((a,b)=>a.outboundDate.localeCompare(b.outboundDate));
  const past=state.trips.filter(t=>daysOut(t.outboundDate)<0);
  if(!active.length&&!past.length){
    wrap.appendChild(h('div',{className:'empty'},h('div',{className:'icon'},'✈️'),h('div',{style:{fontSize:'15px',fontWeight:600,color:'var(--white)',marginBottom:'6px'}},'No trips yet'),h('button',{className:'btn btn-primary',onclick:()=>{view='add';render()}},'+ Add Trip')));
  }else{
    active.forEach(t=>wrap.appendChild(renderTripCard(t)));
    if(past.length){
      const det=h('details',{style:{marginTop:'14px'}},h('summary',null,'Past trips ('+past.length+')'));
      const dv=h('div',{style:{marginTop:'8px'}});
      past.forEach(t=>dv.appendChild(renderTripCard(t)));
      det.appendChild(dv);
      wrap.appendChild(det);
    }
  }
  return wrap;
}

function renderUsagePanel(){
  const s=state.settings.schedule||{days:['Wed','Sat'],hour:9,tz:'ET'};
  const used=state.settings.apiUsage?.[monthKey()]||0;
  const active=state.trips.filter(t=>t.active&&daysOut(t.outboundDate)>=0).length;
  const checksWk=s.days.length;
  const projected=Math.ceil(active*checksWk*(daysLeftInMonth()/7));
  const total=used+projected;
  const overage=Math.max(0,total-FREE_LIMIT);
  const cost=overage*PAID_RATE;
  const withinFree=total<=FREE_LIMIT;
  const pct=Math.min(used/FREE_LIMIT*100,100);
  const card=h('div',{className:'card'});
  card.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'}},
    h('div',{style:{fontSize:'13px',fontWeight:700,color:'var(--white)'}},'API Usage — '+new Date().toLocaleString('default',{month:'long',year:'numeric'})),
    h('span',{className:'pill '+(withinFree?'pill-green':'pill-red')},withinFree?'Free Tier':'$'+cost.toFixed(2)+' overage')
  ));
  const pw=h('div',{className:'progress-wrap'});
  pw.appendChild(h('div',{className:'progress-bar',style:{width:Math.min((used+projected)/FREE_LIMIT*100,100)+'%',background:withinFree?'var(--accent)':'var(--warn)',opacity:'.25'}}));
  pw.appendChild(h('div',{className:'progress-bar',style:{width:pct+'%',background:withinFree?'var(--success)':'var(--danger)'}}));
  pw.appendChild(h('div',{className:'progress-label'},used+' / '+FREE_LIMIT+' used'));
  card.appendChild(pw);
  const ms=h('div',{className:'metrics'});
  [{l:'Used',v:''+used,c:pct>80?'var(--warn)':'var(--success)'},{l:'Free Left',v:''+(FREE_LIMIT-used),c:FREE_LIMIT-used<30?'var(--danger)':'var(--success)'},{l:'Projected',v:'+'+projected,c:withinFree?'var(--accent)':'var(--warn)'},{l:'Trips',v:''+active,c:'var(--accent)'},{l:'Checks/Wk',v:''+checksWk,c:'var(--accent)'},{l:'Est. Cost',v:withinFree?'$0':'$'+cost.toFixed(2),c:withinFree?'var(--success)':'var(--danger)'}].forEach(m=>{
    ms.appendChild(h('div',{className:'metric'},h('div',{className:'val',style:{color:m.c}},m.v),h('div',{className:'lbl'},m.l)));
  });
  card.appendChild(ms);
  return card;
}

function renderTripCard(trip){
  const checks=trip.priceChecks||[];
  const latest=checks.length?checks[checks.length-1]:null;
  const prices=checks.map(c=>c.price).filter(Boolean);
  const lowest=prices.length?Math.min(...prices):null;
  const highest=prices.length?Math.max(...prices):null;
  const avg=prices.length?prices.reduce((s,p)=>s+p,0)/prices.length:null;
  const d=daysOut(trip.outboundDate);
  const drop=trip.bookedPrice&&latest?trip.bookedPrice-latest.price:null;
  const trend=prices.length>=2?(prices[prices.length-1]<prices[prices.length-2]?'down':prices[prices.length-1]>prices[prices.length-2]?'up':'flat'):null;
  const range=(highest||1)-(lowest||0)||1;

  const card=h('div',{className:'card'});
  // Header
  const hdr=h('div',{className:'trip-header'});
  const left=h('div');
  const row1=h('div',{style:{display:'flex',alignItems:'center',gap:'7px',marginBottom:'3px'}});
  row1.appendChild(h('span',{className:'trip-route'},trip.origin+' → '+trip.destination));
  row1.appendChild(h('span',{className:'pill '+(d<0?'pill-red':d<=14?'pill-yellow':'pill-green')},d<0?'Past':d+'d'));
  if(drop>0&&drop>=trip.alertThreshold)row1.appendChild(h('span',{className:'pill pill-green'},'↓ '+fmt(drop)));
  if(trip.tripType==='oneway')row1.appendChild(h('span',{className:'pill pill-gray'},'One way'));
  left.appendChild(row1);
  left.appendChild(h('div',{className:'trip-detail'},[trip.name,trip.outboundDate+(trip.returnDate?' → '+trip.returnDate:''),trip.passengers+'pax',airlineName(trip.airlineFilter),cabinName(trip.cabin),stopsName(trip.stops),trip.flightNumbers].filter(Boolean).join(' · ')));
  hdr.appendChild(left);
  const btns=h('div',{style:{display:'flex',gap:'4px',flexShrink:0}});
  btns.appendChild(h('button',{className:'btn btn-ghost',onclick:()=>{view='edit';editId=trip.id;render()}},'Edit'));
  btns.appendChild(h('button',{className:'btn btn-primary',style:{background:'var(--accentDim)',color:'var(--accent)'},onclick:()=>{checkId=trip.id;render()}},'+ Check'));
  hdr.appendChild(btns);
  card.appendChild(hdr);

  // Metrics
  const ms=h('div',{className:'metrics'});
  [{l:'Latest',v:latest?fmt(latest.price):'—',c:'var(--accent)'},{l:'Lowest',v:lowest!=null?fmt(lowest):'—',c:'var(--success)'},{l:'Avg',v:avg!=null?fmt(avg):'—',c:'var(--warn)'},{l:'Booked',v:trip.bookedPrice?fmt(trip.bookedPrice):'—',c:'var(--white)'},{l:'vs Booked',v:drop!=null?(drop>0?'−':'+')+('$'+Math.abs(drop).toFixed(0)):'—',c:drop>0?'var(--success)':drop<0?'var(--danger)':'var(--dim)'},{l:'Trend',v:trend==='down'?'📉':trend==='up'?'📈':trend==='flat'?'➡️':'—',c:'var(--text)'}].forEach(m=>{
    ms.appendChild(h('div',{className:'metric'},h('div',{className:'val',style:{color:m.c}},m.v),h('div',{className:'lbl'},m.l)));
  });
  card.appendChild(ms);

  // Chart
  if(checks.length>1){
    const chart=h('div',{className:'chart-bar'});
    checks.forEach(c=>{
      const ht=((c.price-(lowest||0))/range)*30+10;
      const col=trip.bookedPrice?(c.price<trip.bookedPrice?'var(--success)':c.price>trip.bookedPrice?'var(--danger)':'var(--accent)'):'var(--accent)';
      chart.appendChild(h('div',{style:{height:Math.max(ht,3)+'px',background:col,opacity:c.source==='auto'?1:.65},title:c.date+': '+fmt(c.price)}));
    });
    card.appendChild(chart);
  }

  // History table
  if(checks.length){
    const det=h('details',null,h('summary',null,'History ('+checks.length+')'));
    const tbl=h('table');
    tbl.appendChild(h('thead',null,h('tr',null,...['Date','Price','Δ Booked','Δ Prev','Source',''].map(x=>h('th',null,x)))));
    const tbody=h('tbody');
    [...checks].reverse().forEach((c,i)=>{
      const idx=checks.length-1-i;
      const prev=idx>0?checks[idx-1].price:null;
      const db=trip.bookedPrice?trip.bookedPrice-c.price:null;
      const dp=prev!=null?prev-c.price:null;
      const tr=h('tr',null,
        h('td',null,c.date),
        h('td',{style:{fontWeight:600}},fmt(c.price)),
        h('td',{style:{color:db>0?'var(--success)':db<0?'var(--danger)':'var(--dim)'}},db!=null?(db>0?'−':'+')+('$'+Math.abs(db).toFixed(0)):'—'),
        h('td',{style:{color:dp>0?'var(--success)':dp<0?'var(--danger)':'var(--dim)'}},dp!=null?(dp>0?'↓':'↑')+('$'+Math.abs(dp).toFixed(0)):'—'),
        h('td',null,h('span',{className:'pill '+(c.source==='auto'?'pill-blue':'pill-gray')},c.source==='auto'?'API':'Manual')),
        h('td',null,h('button',{className:'btn btn-danger',style:{padding:'2px 6px',fontSize:'10px'},onclick:()=>{trip.priceChecks.splice(idx,1);save(state);render()}},'✕'))
      );
      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);
    det.appendChild(h('div',{style:{overflowX:'auto',marginTop:'6px'}},tbl));
    card.appendChild(det);
  }
  return card;
}

function renderTripForm(trip){
  const isNew=!trip;
  const f=trip?{...trip}:{id:uid(),name:'',origin:'',destination:'',outboundDate:'',returnDate:'',passengers:2,airlineFilter:'',flightNumbers:'',stops:'nonstop',tripType:'roundtrip',cabin:'economy',bookedPrice:'',alertThreshold:100,active:true,notes:'',priceChecks:[]};
  const card=h('div',{className:'card'});
  card.appendChild(h('div',{style:{fontSize:'14px',fontWeight:700,marginBottom:'12px',color:'var(--white)'}},isNew?'Add New Trip':'Edit Trip'));

  function field(label,type,key,opts={}){
    const g=h('div',{className:'form-group'+(opts.size==='sm'?' sm':opts.size==='lg'?' lg':'')});
    g.appendChild(h('label',null,label));
    if(type==='select'){
      const s=h('select',{onchange:e=>{f[key]=opts.parse?opts.parse(e.target.value):e.target.value}});
      (opts.options||[]).forEach(o=>{const op=h('option',{value:o.v},o.l);if(f[key]===o.v||f[key]===o.v)op.selected=true;s.appendChild(op)});
      g.appendChild(s);
    }else{
      const inp=h('input',{type:type||'text',value:f[key]!=null?f[key]:'',placeholder:opts.ph||'',oninput:e=>{f[key]=opts.parse?opts.parse(e.target.value):e.target.value}});
      if(opts.max)inp.setAttribute('maxlength',opts.max);
      g.appendChild(inp);
    }
    return g;
  }

  card.appendChild(h('div',{className:'form-row'},
    field('Trip Name','text','name',{size:'lg',ph:'Maui November'}),
    field('Passengers','number','passengers',{size:'sm',parse:v=>parseInt(v)||1})
  ));
  card.appendChild(h('div',{className:'form-row'},
    field('Origin','text','origin',{ph:'CVG',max:3,parse:v=>v.toUpperCase()}),
    field('Destination','text','destination',{ph:'OGG',max:3,parse:v=>v.toUpperCase()}),
    field('Airline','select','airlineFilter',{options:AIRLINES.map(a=>({v:a.c,l:a.l}))}),
    field('Flight #s','text','flightNumbers',{ph:'DL 5014 / DL 4987'})
  ));
  card.appendChild(h('div',{className:'form-row'},
    field('Trip Type','select','tripType',{options:TRIP_TYPES=[{v:'roundtrip',l:'Round trip'},{v:'oneway',l:'One way'}]}),
    field('Cabin','select','cabin',{options:CABINS.map(c=>({v:c.v,l:c.l}))}),
    field('Stops','select','stops',{options:STOPS.map(s=>({v:s.v,l:s.l}))})
  ));
  card.appendChild(h('div',{className:'form-row'},
    field('Outbound Date','date','outboundDate'),
    field('Return Date','date','returnDate'),
    field('Booked Price ($)','number','bookedPrice',{ph:'498',parse:v=>v?parseFloat(v):''}),
    field('Alert Threshold','select','alertThreshold',{options:THRESHOLDS.map(t=>({v:t,l:'≥ $'+t})),parse:v=>parseInt(v)})
  ));
  card.appendChild(h('div',{className:'form-row'},field('Notes','text','notes',{size:'lg',ph:'Optional notes'})));

  const btns=h('div',{className:'btn-row'});
  btns.appendChild(h('button',{className:'btn btn-primary',onclick:()=>{
    if(!f.origin||!f.destination||!f.outboundDate){alert('Origin, destination, and outbound date are required.');return}
    if(isNew)state.trips.push(f);else{const idx=state.trips.findIndex(t=>t.id===f.id);if(idx>=0)state.trips[idx]=f;}
    save(state);view='dashboard';editId=null;render();
  }},isNew?'Add Trip':'Save'));
  btns.appendChild(h('button',{className:'btn btn-ghost',onclick:()=>{view='dashboard';editId=null;render()}},'Cancel'));
  if(!isNew){
    const del=h('button',{className:'btn btn-danger',style:{marginLeft:'auto'},onclick:()=>{
      if(confirm('Delete this trip and all price history?')){state.trips=state.trips.filter(t=>t.id!==f.id);save(state);view='dashboard';editId=null;render();}
    }},'Delete');
    btns.appendChild(del);
  }
  card.appendChild(btns);

  // Python config output
  if(!isNew){
    card.appendChild(h('div',{style:{marginTop:'16px'}},
      h('details',null,
        h('summary',null,'Python config for this trip (copy to flight_monitor_v2.py)'),
        h('div',{className:'config-block'},JSON.stringify({
          id:f.id,name:f.name,origin:f.origin,destination:f.destination,
          outbound_date:f.outboundDate,return_date:f.returnDate,
          passengers:f.passengers,airline_filter:f.airlineFilter,
          flight_numbers:f.flightNumbers,booked_price:f.bookedPrice||null,
          alert_threshold:f.alertThreshold,active:f.active
        },null,2))
      )
    ));
  }
  return card;
}

function renderCheckModal(trip){
  if(!trip)return h('div');
  const overlay=h('div',{className:'modal-overlay',onclick:e=>{if(e.target===overlay){checkId=null;render()}}});
  const modal=h('div',{className:'modal'});
  modal.appendChild(h('div',{style:{fontSize:'14px',fontWeight:700,color:'var(--white)',marginBottom:'3px'}},'Log Price Check'));
  modal.appendChild(h('div',{style:{fontSize:'12px',color:'var(--dim)',marginBottom:'12px'}},trip.origin+' → '+trip.destination));
  let d=today(),p='',n='';
  modal.appendChild(h('div',{className:'form-row'},
    (()=>{const g=h('div',{className:'form-group'});g.appendChild(h('label',null,'Date'));g.appendChild(h('input',{type:'date',value:d,oninput:e=>{d=e.target.value}}));return g})(),
    (()=>{const g=h('div',{className:'form-group'});g.appendChild(h('label',null,'Price ($)'));const i=h('input',{type:'number',step:'0.01',placeholder:'348',oninput:e=>{p=e.target.value}});setTimeout(()=>i.focus(),100);g.appendChild(i);return g})()
  ));
  const ng=h('div',{style:{marginBottom:'12px'}});ng.appendChild(h('label',null,'Notes'));ng.appendChild(h('input',{placeholder:'Optional',oninput:e=>{n=e.target.value}}));modal.appendChild(ng);
  modal.appendChild(h('div',{className:'btn-row'},
    h('button',{className:'btn btn-primary',onclick:()=>{
      if(!p){alert('Enter a price');return}
      trip.priceChecks=trip.priceChecks||[];
      trip.priceChecks.push({date:d,price:parseFloat(p),notes:n,source:'manual'});
      trip.priceChecks.sort((a,b)=>a.date.localeCompare(b.date));
      save(state);checkId=null;render();
    }},'Save'),
    h('button',{className:'btn btn-ghost',onclick:()=>{checkId=null;render()}},'Cancel')
  ));
  overlay.appendChild(modal);
  return overlay;
}

function renderSettings(){
  const wrap=h('div');
  // Schedule
  const sched=h('div',{className:'card'});
  sched.appendChild(h('div',{style:{fontSize:'13px',fontWeight:700,color:'var(--white)',marginBottom:'10px'}},'Schedule & Frequency'));
  sched.appendChild(h('label',null,'Check Days'));
  const dp=h('div',{className:'day-picker',style:{marginBottom:'12px'}});
  const s=state.settings.schedule||{days:['Wed','Sat'],hour:9,tz:'ET'};
  DAYS.forEach(d=>{
    dp.appendChild(h('button',{className:'day-btn'+(s.days.includes(d)?' active':''),onclick:()=>{
      if(s.days.includes(d))s.days=s.days.filter(x=>x!==d);else s.days.push(d);
      state.settings.schedule=s;save(state);render();
    }},d));
  });
  sched.appendChild(dp);
  sched.appendChild(h('div',{className:'form-row'},
    (()=>{const g=h('div',{className:'form-group'});g.appendChild(h('label',null,'Time'));const sl=h('select',{onchange:e=>{s.hour=parseInt(e.target.value);state.settings.schedule=s;save(state);render()}});HOURS.forEach(hr=>{const o=h('option',{value:hr.v},hr.l);if(s.hour===hr.v)o.selected=true;sl.appendChild(o)});g.appendChild(sl);return g})(),
    (()=>{const g=h('div',{className:'form-group'});g.appendChild(h('label',null,'Timezone'));const sl=h('select',{onchange:e=>{s.tz=e.target.value;state.settings.schedule=s;save(state);render()}});['ET','CT','MT','PT'].forEach(tz=>{const o=h('option',{value:tz},tz);if(s.tz===tz)o.selected=true;sl.appendChild(o)});g.appendChild(sl);return g})()
  ));
  // Impact calc
  const active=state.trips.filter(t=>t.active&&daysOut(t.outboundDate)>=0).length;
  const monthly=Math.ceil(active*s.days.length*4.3);
  const withinFree=monthly<=FREE_LIMIT;
  const tzOff={ET:4,CT:5,MT:6,PT:7};
  const utcH=((s.hour||9)+(tzOff[s.tz]||4))%24;
  const dayMap={Mon:1,Tue:2,Wed:3,Thu:4,Fri:5,Sat:6,Sun:0};
  const cronDays=s.days.map(d=>dayMap[d]).sort().join(',');
  const cronStr='0 '+utcH+' * * '+cronDays;
  const impact=h('div',{className:'impact'});
  impact.innerHTML='<b style="color:var(--text)">'+s.days.length+'×/week</b> × '+active+' trip'+(active!==1?'s':'')+' = <b style="color:var(--accent)">'+s.days.length*active+' API calls/week</b><br>~<b style="color:'+(withinFree?'var(--success)':'var(--danger)')+'">'+monthly+' calls/month</b>'+(withinFree?' — within free tier':' — exceeds free tier, ≈$'+(Math.max(0,monthly-FREE_LIMIT)*PAID_RATE).toFixed(2)+'/mo')+'<br><br>Cron: <code style="background:var(--card);padding:2px 6px;border-radius:4px;color:var(--dim)">'+cronStr+'</code><br><span style="font-size:11px;color:var(--muted)">Update this in .github/workflows/flight-monitor.yml line 24</span>';
  sched.appendChild(impact);
  wrap.appendChild(sched);

  // Import
  const imp=h('div',{className:'card'});
  imp.appendChild(h('div',{style:{fontSize:'13px',fontWeight:700,color:'var(--white)',marginBottom:'8px'}},'Import Price History'));
  imp.appendChild(h('div',{style:{fontSize:'12px',color:'var(--dim)',marginBottom:'10px',lineHeight:'1.6'}},'Paste the JSON output from a GitHub Actions run to import automated price checks into the dashboard.'));
  const ta=h('textarea',{placeholder:'Paste JSON here...',style:{marginBottom:'8px'}});
  imp.appendChild(ta);
  imp.appendChild(h('button',{className:'btn btn-primary',onclick:()=>{
    try{
      const data=JSON.parse(ta.value);
      let count=0;
      Object.entries(data).forEach(([tripId,tripData])=>{
        const trip=state.trips.find(t=>t.id===tripId);
        if(!trip||!tripData.checks)return;
        const existing=new Set((trip.priceChecks||[]).map(c=>c.date));
        tripData.checks.forEach(c=>{
          const date=(c.timestamp||'').split('T')[0];
          if(c.price&&date&&!existing.has(date)){
            trip.priceChecks=trip.priceChecks||[];
            trip.priceChecks.push({date,price:c.price,notes:c.price_level||'',source:'auto'});
            count++;
          }
        });
        trip.priceChecks.sort((a,b)=>a.date.localeCompare(b.date));
      });
      save(state);render();alert('Imported '+count+' price check(s).');
    }catch(e){alert('Invalid JSON: '+e.message)}
  }},'Import'));
  wrap.appendChild(imp);

  // Architecture
  const arch=h('div',{className:'card'});
  arch.appendChild(h('div',{style:{fontSize:'13px',fontWeight:700,color:'var(--white)',marginBottom:'6px'}},'System Architecture'));
  const ad=h('div',{style:{fontSize:'11.5px',color:'var(--dim)',lineHeight:'1.9',fontFamily:'Menlo,monospace'}});
  ad.innerHTML='GitHub Actions (free) → cron schedule<br><span style="padding-left:16px">↓ flight_monitor_v2.py</span><br><span style="padding-left:16px">↓ SerpApi (free, '+FREE_LIMIT+'/mo) → Google Flights</span><br><span style="padding-left:16px">↓ Discord webhook → push to iPhone</span><br><span style="padding-left:16px">↓ This dashboard → view history</span><br><br><span style="color:var(--muted)">Total: $0/month</span>';
  arch.appendChild(ad);
  wrap.appendChild(arch);

  // Data management
  const dm=h('div',{className:'card'});
  dm.appendChild(h('div',{style:{fontSize:'13px',fontWeight:700,color:'var(--white)',marginBottom:'8px'}},'Data'));
  dm.appendChild(h('div',{className:'btn-row'},
    h('button',{className:'btn btn-ghost',onclick:()=>{
      const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
      const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='flight-monitor-backup.json';a.click();
    }},'Export Backup'),
    h('button',{className:'btn btn-ghost',onclick:()=>{
      const inp=document.createElement('input');inp.type='file';inp.accept='.json';
      inp.onchange=e=>{const r=new FileReader();r.onload=()=>{try{state=JSON.parse(r.result);save(state);render();alert('Restored.')}catch(e){alert('Invalid file')}};r.readAsText(e.target.files[0])};inp.click();
    }},'Restore from Backup'),
    h('button',{className:'btn btn-danger',onclick:()=>{if(confirm('Clear ALL data? This cannot be undone.')){localStorage.removeItem(LS_KEY);state={trips:[],settings:{schedule:{days:['Wed','Sat'],hour:9,tz:'ET'},apiUsage:{}}};render()}}},'Reset All Data')
  ));
  wrap.appendChild(dm);
  return wrap;
}

render();
</script>
</body>
</html>
