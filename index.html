<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Flight Monitor</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✈️</text></svg>">
<style>
:root{--bg:#354165;--sf:#3b4870;--cd:#42507a;--al:#4d5d8a;--bd:#6070a0;--ac:#7db8ff;--acd:#4a6aaa;--ok:#3ee0a5;--okb:#1f5a45;--wn:#fcc73e;--wnb:#7a5515;--dg:#ff8080;--dgb:#7a2a2a;--pp:#c89dff;--ppb:#6535bb;--tx:#f0f3f9;--dm:#bcc8e2;--mt:#8090b8;--wh:#f8fafc}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}input,select,button,textarea{font-family:inherit}
.hd{background:var(--sf);border-bottom:1px solid var(--bd);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:100}
.hd-l{display:flex;align-items:center;gap:9px}.logo{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,var(--ac),#7c3aed);display:flex;align-items:center;justify-content:center;font-size:14px}
.hd h1{font-size:17px;font-weight:700;color:var(--wh)}.hd .sub{font-size:12px;color:var(--dm)}
.nv{display:flex;gap:2px;align-items:center}.nv button{padding:6px 12px;border-radius:6px;border:none;font-size:13px;font-weight:600;cursor:pointer;background:transparent;color:var(--dm)}.nv button.on{background:var(--ac);color:var(--wh)}
.mn{padding:12px 14px;max-width:860px;margin:0 auto}.c{background:var(--cd);border:1px solid var(--bd);border-radius:10px;padding:12px 14px;margin-bottom:10px}
.p{display:inline-flex;align-items:center;gap:3px;padding:2px 9px;border-radius:16px;font-size:12px;font-weight:600}
.pg{background:var(--okb);color:var(--ok)}.py{background:var(--wnb);color:var(--wn)}.pr{background:var(--dgb);color:var(--dg)}.pb{background:var(--acd);color:var(--ac)}.pgr{background:var(--al);color:var(--dm)}.pp2{background:var(--ppb);color:var(--pp)}
.ms{display:flex;gap:4px;flex-wrap:wrap;margin:8px 0}.m{flex:1;min-width:58px;background:var(--al);border-radius:6px;padding:7px 3px;text-align:center}
.m .v{font-size:17px;font-weight:700}.m .l{font-size:10px;color:var(--dm);margin-top:1px;text-transform:uppercase;font-weight:600;letter-spacing:.04em}
.fr{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}.fg{flex:1;min-width:100px}.fg.s{flex:.5;min-width:65px}.fg.l{flex:2;min-width:160px}
label{display:block;font-size:11.5px;font-weight:700;color:var(--dm);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
input,select{width:100%;padding:7px 9px;border-radius:6px;border:1px solid var(--bd);background:var(--al);color:var(--tx);font-size:14px;outline:none}input:focus,select:focus{border-color:var(--ac)}select{appearance:none}
.b{padding:6px 13px;border-radius:6px;border:none;font-size:13px;font-weight:600;cursor:pointer}.b:active{opacity:.8}
.bp{background:var(--ac);color:var(--wh)}.bg2{background:var(--al);color:var(--dm);border:1px solid var(--bd)}.bd{background:var(--dgb);color:var(--dg)}.bs{background:var(--okb);color:var(--ok)}.bpp{background:var(--ppb);color:var(--pp)}
.brun{background:var(--ok);color:#fff;border:none;padding:6px 14px;font-weight:700}
.br{display:flex;gap:5px;margin-top:10px}.cb{display:flex;align-items:flex-end;gap:1px;height:36px}.cb div{flex:1;border-radius:2px 2px 0 0;min-width:2px}
details summary{font-size:13px;color:var(--dm);cursor:pointer;font-weight:600;padding:3px 0}
table{width:100%;border-collapse:collapse;font-size:13px}th{text-align:left;padding:4px 6px;border-bottom:1px solid var(--bd);color:var(--dm);font-size:11px;font-weight:700;text-transform:uppercase}
td{padding:5px 6px;border-bottom:1px solid var(--bd)}tr:nth-child(even){background:var(--al)}
.dp{display:flex;gap:3px}.db{flex:1;padding:7px 0;border-radius:6px;border:1px solid var(--bd);background:var(--al);color:var(--dm);font-size:13px;font-weight:600;cursor:pointer;text-align:center}.db.on{border-color:var(--ac);background:var(--acd);color:var(--ac)}
.pw{position:relative;height:20px;background:var(--al);border-radius:5px;overflow:hidden;margin-bottom:6px}
.pb3{position:absolute;height:100%;border-radius:5px;transition:width .3s}.pl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--wh)}
.gg{position:relative;height:52px;margin-bottom:2px}
.imp{background:var(--al);border-radius:6px;padding:8px 10px;font-size:13px;color:var(--dm);line-height:1.6;margin-top:6px}
.empty{text-align:center;padding:40px 16px;color:var(--dm)}.empty .ic{font-size:32px;margin-bottom:8px}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:200;padding:12px}.mo .mc{background:var(--cd);border:1px solid var(--bd);border-radius:10px;padding:14px;max-width:400px;width:100%}
.ft{text-align:center;padding:16px;font-size:11px;color:var(--mt)}.lgd{display:flex;gap:10px;font-size:12px;color:var(--dm);margin-top:5px;flex-wrap:wrap}
.lgd .sq{display:inline-block;width:11px;height:6px;border-radius:2px;margin-right:2px;vertical-align:middle}
.sync-badge{font-size:11px;padding:2px 6px;border-radius:8px;margin-left:6px}
@media(max-width:480px){.fg{min-width:100%!important}.ms{gap:3px}.m{min-width:48px;padding:5px 2px}.m .v{font-size:15px}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const LS='fm-v6',FL=250,PR=.015,REPO='accountingqfs-beep/flight-monitor',WF='flight-monitor.yml',PD_URL='https://raw.githubusercontent.com/accountingqfs-beep/flight-monitor/main/price_data.json',TRIPS_URL='https://raw.githubusercontent.com/accountingqfs-beep/flight-monitor/main/trips.json';
const AL=[{c:'',l:'All'},{c:'DL',l:'Delta'},{c:'UA',l:'United'},{c:'AA',l:'American'},{c:'WN',l:'Southwest'},{c:'B6',l:'JetBlue'},{c:'AS',l:'Alaska'},{c:'NK',l:'Spirit'},{c:'F9',l:'Frontier'},{c:'HA',l:'Hawaiian'}];
const ST=[{v:'nonstop',l:'Nonstop'},{v:'1stop',l:'1 stop or fewer'},{v:'any',l:'Any'}];
const CB2=[{v:'economy',l:'Economy'},{v:'premium',l:'Premium Econ'},{v:'business',l:'Business'},{v:'first',l:'First'}];
const DY=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const HR=Array.from({length:24},(_,i)=>({v:i,l:i===0?'12a':i<12?i+'a':i===12?'12p':(i-12)+'p'}));
const TH=[10,15,20,25,30,35,40,50,60,75,100],RB=[25,50,75,100,150];
const DT={id:'',nm:'',or:'',ds:'',od:'',rd:'',px:2,af:'',fn:'',st:'nonstop',tt:'roundtrip',cb:'economy',bp:'',at:100,pt:40,rb:50,ac:true,ow:false,oa:'',ra:'',pc:[],archived:false};
const DS={sch:{days:['Tue','Fri'],hr:9,tz:'ET'},api:{},pat:''};
function ld(){try{const d=JSON.parse(localStorage.getItem(LS));return d&&d.t?d:{t:[],s:{...DS}}}catch(e){return{t:[],s:{...DS}}}}
function sv(d){localStorage.setItem(LS,JSON.stringify(d))}
function uid(){return Math.random().toString(36).slice(2,9)}
function td(){return new Date().toISOString().split('T')[0]}
function dout(d){return Math.ceil((new Date(d)-new Date(td()))/864e5)}
function fmt(n){return n!=null?'$'+Number(n).toFixed(0):'--'}
function aln(c){return(AL.find(a=>a.c===c)||{}).l||c||'All'}
function cbn(c){return(CB2.find(x=>x.v===c)||{}).l||'Economy'}
function stn(c){return(ST.find(x=>x.v===c)||{}).l||''}
function mk(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')}
function dlm(){const d=new Date();return new Date(d.getFullYear(),d.getMonth()+1,0).getDate()-d.getDate()}
function h(t,p,...c){const e=document.createElement(t);if(p)Object.entries(p).forEach(([k,v])=>{if(k.startsWith('on'))e[k]=v;else if(k==='cn')e.className=v;else if(k==='st'&&typeof v==='object')Object.assign(e.style,v);else if(k==='checked')e.checked=v;else if(k==='selected')e.selected=v;else e.setAttribute(k,v)});c.flat(9).forEach(x=>{if(x!=null)e.appendChild(typeof x==='string'?document.createTextNode(x):x)});return e}
let S=ld(),vw='dash',eid=null,cid=null,runStatus='',syncStatus='',showInfo=false;

// ═══ AUTO-SYNC: fetch price_data.json from repo ═══
async function syncPrices(){
  syncStatus='syncing';R();
  try{
    const r=await fetch(PD_URL+'?t='+Date.now());
    if(!r.ok){syncStatus='none';R();return}
    const pd=await r.json();let n=0;
    S.t.forEach(trip=>{
      const checks=pd[trip.id];if(!checks||!checks.length)return;
      const existing=new Set((trip.pc||[]).map(c=>c.dt));
      checks.forEach(c=>{
        if(c.rtp&&c.dt&&!existing.has(c.dt)){
          trip.pc=trip.pc||[];
          trip.pc.push({dt:c.dt,rtp:c.rtp,rsp:c.rsp||null,rsd:c.rsd||null,owt:c.owt||null,owop:c.owop||null,owoa:c.owoa||null,owrp:c.owrp||null,owra:c.owra||null,tr:c.tr||[],src:'auto'});
          n++;
        }
      });
      trip.pc.sort((a,b)=>a.dt.localeCompare(b.dt));
    });
    if(n>0)sv(S);
    syncStatus='done';R();
    setTimeout(()=>{syncStatus='';R()},3000);
  }catch(e){syncStatus='error';R();setTimeout(()=>{syncStatus='';R()},3000)}
}

// ═══ SYNC TRIPS: fetch trips.json from repo ═══
async function syncTrips(){
  try{
    const r=await fetch(TRIPS_URL+'?t='+Date.now());
    if(!r.ok)return;
    const remote=await r.json();
    const localById={};S.t.forEach(t=>{localById[t.id]=t});
    let changed=false;
    remote.forEach(rt=>{
      if(localById[rt.id]){
        // Keep local price history, merge remote config fields
        const loc=localById[rt.id];
        const keys=['nm','or','ds','od','rd','px','af','fn','st','tt','cb','bp','at','pt','rb','ac','ow','oa','ra','archived','nt'];
        keys.forEach(k=>{if(rt[k]!==undefined&&rt[k]!==loc[k]){loc[k]=rt[k];changed=true}});
      }else{
        // New trip from repo — add it
        rt.pc=[];S.t.push(rt);changed=true;
      }
    });
    if(changed){sv(S);R()}
  }catch(e){console.log('Trip sync error:',e)}
}

// ═══ COMMIT trips.json TO GITHUB ═══
async function commitTrips(){
  const pat=S.s.pat;if(!pat)return;
  const url='https://api.github.com/repos/'+REPO+'/contents/trips.json';
  const headers={'Authorization':'Bearer '+pat,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'};
  // Get current sha
  let sha=null;
  try{const r=await fetch(url,{headers});if(r.ok)sha=(await r.json()).sha}catch(e){}
  // Build clean trip array (strip price history for trips.json)
  const clean=S.t.map(t=>{
    const c={...t};delete c.pc;return c;
  });
  const content=btoa(unescape(encodeURIComponent(JSON.stringify(clean,null,2))));
  const body={message:'Update trip definitions',content,branch:'main'};
  if(sha)body.sha=sha;
  try{
    const r=await fetch(url,{method:'PUT',headers,body:JSON.stringify(body)});
    if(r.ok)console.log('trips.json committed');
    else console.log('trips.json commit failed:',r.status);
  }catch(e){console.log('trips.json commit error:',e)}
}

async function triggerRun(){
  const pat=S.s.pat;if(!pat){alert('Run Now requires admin access. Price checks run automatically on the scheduled days — no action needed.');return}
  runStatus='running';R();
  try{
    const r=await fetch('https://api.github.com/repos/'+REPO+'/actions/workflows/'+WF+'/dispatches',{
      method:'POST',headers:{'Authorization':'Bearer '+pat,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
      body:JSON.stringify({ref:'main',inputs:{always_notify:'true'}})});
    if(r.status===204){runStatus='sent';R();setTimeout(()=>{runStatus='';R()},5000)}
    else if(r.status===401){runStatus='error';R();alert('Token expired or invalid. Update it in Settings.');setTimeout(()=>{runStatus='';R()},3000)}
    else{runStatus='error';R();alert('Error '+r.status);setTimeout(()=>{runStatus='';R()},3000)}
  }catch(e){runStatus='error';R();alert('Error: '+e.message);setTimeout(()=>{runStatus='';R()},3000)}
}

function R(){const a=document.getElementById('app');a.innerHTML='';a.appendChild(rHd());const m=h('div',{cn:'mn'});
if(vw==='dash')m.appendChild(rDash());else if(vw==='add')m.appendChild(rForm(null));else if(vw==='edit'&&eid)m.appendChild(rForm(S.t.find(t=>t.id===eid)));else if(vw==='set')m.appendChild(rSet());
a.appendChild(m);a.appendChild(h('div',{cn:'ft'},'Auto-syncs from GitHub repo'));if(cid)a.appendChild(rChkMo(S.t.find(t=>t.id===cid)));if(showInfo)a.appendChild(rInfo())}
function rHd(){const at=S.t.filter(t=>t.ac&&!t.archived&&dout(t.od)>=0),u=S.s.api?.[mk()]||0;
let lastTs=null;S.t.forEach(t=>{(t.pc||[]).forEach(c=>{const ts=c.ts||c.dt;if(ts&&(!lastTs||ts>lastTs))lastTs=ts})});
const lastStr=lastTs?'Last check: '+new Date(lastTs).toLocaleDateString('en-US',{month:'short',day:'numeric'})+' '+new Date(lastTs).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}):'No checks yet';
const nav=h('div',{cn:'nv'});
[['dash','Trips'],['add','+ Add'],['set','Settings']].forEach(([v,l])=>nav.appendChild(h('button',{cn:vw===v||(vw==='edit'&&v==='dash')?'on':'',onclick:()=>{vw=v;eid=null;R()}},l)));
const ib=h('button',{cn:'b',st:{background:'var(--al)',color:'var(--dm)',border:'1px solid var(--bd)',width:'32px',height:'32px',borderRadius:'50%',padding:0,fontSize:'15px',fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'},onclick:()=>{showInfo=!showInfo;R()}},'i');
nav.appendChild(ib);
const rb=h('button',{cn:'b',st:{background:'#10b981',color:'#fff',fontWeight:700,padding:'6px 14px',borderRadius:'6px',border:'none'},onclick:()=>{if(runStatus!=='running')triggerRun()}},runStatus==='running'?'Running...':runStatus==='sent'?'Sent!':'Run Now');
nav.appendChild(rb);
return h('div',{cn:'hd'},h('div',{cn:'hd-l'},h('div',{cn:'logo'},'*'),h('div',null,h('h1',null,'Flight Monitor'),h('div',{cn:'sub'},at.length+' active | '+u+'/'+FL+' API | '+lastStr))),nav)}

function rGauge(trip){
const ck=trip.pc||[];if(!ck.length)return h('div');
const ps=ck.map(c=>c.rtp).filter(Boolean);const cur=ps.length?ps[ps.length-1]:null;if(!cur)return h('div');
const lo=Math.min(...ps),hi=Math.max(...ps);const last=ck[ck.length-1];
const plo=last?.tr?.[0]||null,phi=last?.tr?.[1]||null;
const floor=Math.min(plo||Infinity,lo);if(!isFinite(floor))return h('div');
const booked=trip.bp;const hasB=booked&&booked>0;const rbT=trip.rb||50;
let topC,botC,botP,botL;
if(hasB){botC='var(--pp)';botP=booked;botL=fmt(booked)+' booked';const sv2=booked-cur;topC=sv2>=rbT?'var(--ok)':sv2>0?'var(--ac)':'var(--dg)'}
else{const tgt=Math.round(floor*(1+(trip.pt||40)/100));botC='var(--wn)';botP=tgt;botL=fmt(tgt)+' tgt';topC=cur>tgt?'var(--dg)':'var(--ok)'}
const sMin=Math.floor(Math.min(floor,lo,cur,botP)*.85/50)*50,sMax=Math.ceil(Math.max(phi||0,hi,cur,botP)*1.1/50)*50;
const rng=sMax-sMin||1;const pc=v=>((v-sMin)/rng*100);
const ticks=[];const step=rng<=400?100:rng<=800?200:rng<=1500?300:500;
for(let v=Math.ceil(sMin/step)*step;v<=sMax;v+=step)ticks.push(v);
const w=h('div',{st:{marginBottom:'6px'}});
w.appendChild(h('div',{st:{display:'flex',justifyContent:'space-between',fontSize:'12px',color:'var(--dm)',marginBottom:'2px'}},...ticks.map(v=>h('span',null,'$'+v))));
const gg=h('div',{cn:'gg'});
gg.appendChild(h('div',{st:{position:'absolute',top:'14px',left:'0',right:'0',height:'12px',background:'var(--al)',borderRadius:'6px'}}));
if(plo&&phi)gg.appendChild(h('div',{st:{position:'absolute',top:'11px',left:pc(plo)+'%',width:(pc(phi)-pc(plo))+'%',height:'18px',borderRadius:'5px',background:'#3b82f6',opacity:'.25'}}));
if(ps.length>1)gg.appendChild(h('div',{st:{position:'absolute',top:'13px',left:pc(lo)+'%',width:Math.max(pc(hi)-pc(lo),1.5)+'%',height:'14px',borderRadius:'3px',background:'#60a5fa',opacity:'.45'}}));
else gg.appendChild(h('div',{st:{position:'absolute',top:'13px',left:pc(lo)+'%',width:'1.5%',height:'14px',borderRadius:'3px',background:'#60a5fa',opacity:'.45'}}));
const ca=h('div',{st:{position:'absolute',top:'0',left:pc(cur)+'%',transform:'translateX(-50%)'}});
ca.appendChild(h('div',{st:{width:'0',height:'0',borderLeft:'7px solid transparent',borderRight:'7px solid transparent',borderTop:'9px solid '+topC}}));
ca.appendChild(h('div',{st:{position:'absolute',top:'-15px',left:'50%',transform:'translateX(-50%)',fontSize:'13px',fontWeight:'600',color:topC,whiteSpace:'nowrap'}},fmt(cur)));gg.appendChild(ca);
const ba=h('div',{st:{position:'absolute',top:'30px',left:pc(botP)+'%',transform:'translateX(-50%)'}});
ba.appendChild(h('div',{st:{width:'0',height:'0',borderLeft:'6px solid transparent',borderRight:'6px solid transparent',borderBottom:'8px solid '+botC}}));
ba.appendChild(h('div',{st:{position:'absolute',top:'10px',left:'50%',transform:'translateX(-50%)',fontSize:'11px',fontWeight:'600',color:botC,whiteSpace:'nowrap'}},botL));gg.appendChild(ba);
w.appendChild(gg);
const lg=h('div',{cn:'lgd'});
if(plo&&phi)lg.appendChild(h('span',null,h('i',{cn:'sq',st:{background:'rgba(59,130,246,.3)'}}),` Proj ${fmt(plo)}-${fmt(phi)}`));
lg.appendChild(h('span',null,h('i',{cn:'sq',st:{background:'rgba(96,165,250,.5)'}}),` Tracked ${fmt(lo)}${hi!==lo?'-'+fmt(hi):''}`));
lg.appendChild(h('span',null,h('span',{st:{display:'inline-block',width:'0',height:'0',borderLeft:'4px solid transparent',borderRight:'4px solid transparent',borderTop:'5px solid '+topC,marginRight:'3px',verticalAlign:'middle'}}),` Cur`));
lg.appendChild(h('span',null,h('span',{st:{display:'inline-block',width:'0',height:'0',borderLeft:'4px solid transparent',borderRight:'4px solid transparent',borderBottom:'5px solid '+botC,marginRight:'3px',verticalAlign:'middle'}}),hasB?' Booked':' Tgt'));
w.appendChild(lg);return w}

function rCard(trip){const ck=trip.pc||[],lat=ck.length?ck[ck.length-1]:null;
const rtp=ck.map(c=>c.rtp).filter(Boolean);const lo=rtp.length?Math.min(...rtp):null,hi=rtp.length?Math.max(...rtp):null;
const d=dout(trip.od);const drop=trip.bp&&lat?.rtp?trip.bp-lat.rtp:null;
const trend=rtp.length>=2?(rtp[rtp.length-1]<rtp[rtp.length-2]?'dn':rtp[rtp.length-1]>rtp[rtp.length-2]?'up':'flat'):null;
const stC=d<0?'pr':d<=14?'py':'pg';const cd=h('div',{cn:'c'});
const hd=h('div',{st:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'6px'}});
const lt=h('div');const r1=h('div',{st:{display:'flex',alignItems:'center',gap:'5px',marginBottom:'2px',flexWrap:'wrap'}});
r1.appendChild(h('span',{st:{fontSize:'17px',fontWeight:700,color:'var(--wh)'}},trip.or+' -> '+trip.ds));
r1.appendChild(h('span',{cn:'p '+stC},d<0?'Past':d+'d'));
if(drop&&drop>=(trip.rb||50))r1.appendChild(h('span',{cn:'p pg'},'Rebook! -'+fmt(drop)));
if(trip.bp)r1.appendChild(h('span',{cn:'p pp2'},'Booked '+fmt(trip.bp)));
lt.appendChild(r1);
lt.appendChild(h('div',{st:{fontSize:'12px',color:'var(--dm)'}},[trip.nm,trip.od+(trip.rd?' -> '+trip.rd:''),trip.px+'pax',aln(trip.af),cbn(trip.cb),stn(trip.st)].filter(Boolean).join(' | ')));
hd.appendChild(lt);
const bs=h('div',{st:{display:'flex',gap:'3px',flexShrink:0}});
bs.appendChild(h('button',{cn:'b bg2',onclick:()=>{vw='edit';eid=trip.id;R()}},'Edit'));
bs.appendChild(h('button',{cn:'b bp',st:{background:'var(--acd)',color:'var(--ac)'},onclick:()=>{cid=trip.id;R()}},'+ Chk'));
bs.appendChild(h('button',{cn:'b bpp',onclick:()=>{if(confirm('Archive '+trip.or+'→'+trip.ds+'?')){trip.archived=true;sv(S);commitTrips();R()}}},'Archive'));
hd.appendChild(bs);cd.appendChild(hd);
cd.appendChild(rGauge(trip));
const ms=h('div',{cn:'ms'});
[{l:'RT Low',v:lat?.rtp?fmt(lat.rtp):'--',c:lat?.rtp?'var(--ac)':'var(--dm)'},
