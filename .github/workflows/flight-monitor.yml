name: Flight Price Monitor
on:
  schedule:
    - cron: '0 13 * * 2,5'
  workflow_dispatch:
    inputs:
      always_notify:
        description: 'Send Discord alert even if no price drop'
        required: false
        default: 'true'
jobs:
  check-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests -q
      - name: Check all trips
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          ALWAYS_NOTIFY: ${{ github.event.inputs.always_notify || 'true' }}
        run: python flight_monitor_v3.py check
