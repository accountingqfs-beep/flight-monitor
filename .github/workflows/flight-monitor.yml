# ─────────────────────────────────────────────────────────────────────────────
# Flight Price Monitor — GitHub Actions Workflow
# ─────────────────────────────────────────────────────────────────────────────
# Runs twice weekly (Wed + Sat at 9am ET).
# Checks all active trips and sends Discord notifications.
#
# REQUIRED SECRETS (Settings → Secrets → Actions):
#   SERPAPI_KEY       — Your SerpApi API key (free at serpapi.com)
#   DISCORD_WEBHOOK   — Your Discord webhook URL
#
# OPTIONAL SECRETS:
#   EMAIL_ENABLED     — "true" to enable email backup
#   EMAIL_SENDER      — Gmail address
#   EMAIL_PASSWORD    — Gmail App Password
#   EMAIL_RECIPIENTS  — Comma-separated email addresses
#   SMS_GATEWAY       — Carrier SMS gateway (e.g., 5135551234@txt.att.net)
# ─────────────────────────────────────────────────────────────────────────────

name: Flight Price Monitor

on:
  schedule:
    # Twice weekly: Wednesday + Saturday at 9:00 AM Eastern (1:00 PM UTC)
    - cron: '0 13 * * 3,6'

  # Manual trigger — click "Run workflow" in GitHub Actions tab
  workflow_dispatch:
    inputs:
      always_notify:
        description: 'Send Discord alert even if no price drop'
        required: false
        default: 'true'

jobs:
  check-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install requests
        run: pip install requests -q

      # Restore price history from previous runs
      - name: Restore price history
        uses: actions/cache/restore@v4
        with:
          path: ~/.flight_monitor
          key: flight-history-${{ github.run_number }}
          restore-keys: |
            flight-history-

      # Run the monitor
      - name: Check all trips
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          EMAIL_ENABLED: ${{ secrets.EMAIL_ENABLED || 'false' }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER || '' }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD || '' }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS || '' }}
          SMS_GATEWAY: ${{ secrets.SMS_GATEWAY || '' }}
          ALWAYS_NOTIFY: ${{ github.event.inputs.always_notify || 'true' }}
        run: python flight_monitor_v2.py check

      # Show status summary
      - name: Print status
        run: python flight_monitor_v2.py status
        continue-on-error: true

      # Save price history for next run
      - name: Save price history
        uses: actions/cache/save@v4
        if: always()
        with:
          path: ~/.flight_monitor
          key: flight-history-${{ github.run_number }}

      # Also save as downloadable artifact
      - name: Upload history artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: price-history-${{ github.run_number }}
          path: ~/.flight_monitor/
          retention-days: 90
